<style>
  @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html,
  body {
    background: #fff0f5;
    font-family: 'Nunito', sans-serif;
    overflow-x: hidden;
  }

  .confetti-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .confetti {
    position: absolute;
    opacity: 0;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0% {
      transform: translateY(-20px) rotate(0deg);
      opacity: 1;
    }

    100% {
      transform: translateY(110vh) rotate(720deg);
      opacity: 0.3;
    }
  }

  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    z-index: 1;
  }

  .arc-text-svg {
    width: min(700px, 95vw);
    max-height: 180px;
  }

  #cakeMount {
    width: min(320px, 80vw);
    height: min(320px, 80vw);
    margin-top: 0px;
  }

  #cakeMount canvas {
    width: 100% !important;
    height: 100% !important;
    border-radius: 50%;
  }

  .subtitle {
    margin-top: 18px;
    font-size: clamp(14px, 3vw, 18px);
    color: #c77b9c;
    letter-spacing: .08em;
    text-align: center;
    opacity: 0;
    animation: fadeUp 1s ease .8s forwards;
  }

  @keyframes fadeUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .scroll-hint {
    margin-top: 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    color: #e8a0bf;
    font-size: 13px;
    opacity: 0;
    animation: fadeUp 1s ease 1.2s forwards, bounce2 2s ease-in-out 2.2s infinite;
  }

  @keyframes bounce2 {

    0%,
    100% {
      transform: translateY(0);
    }

    50% {
      transform: translateY(8px);
    }
  }

  .scroll-arrow {
    width: 22px;
    height: 22px;
    border-right: 2px solid #e8a0bf;
    border-bottom: 2px solid #e8a0bf;
    transform: rotate(45deg);
    border-radius: 2px;
  }

  .saudade-section {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, #fff0f5 0%, #fce4ec 40%, #fdf6e3 100%);
    padding: 60px 20px;
    z-index: 1;
    overflow: hidden;
  }

  .saudade-title {
    font-family: 'Pacifico', cursive;
    font-size: clamp(26px, 5vw, 40px);
    color: #d4709a;
    text-align: center;
    margin-bottom: 12px;
    text-shadow: 2px 3px 0 #f9c0d8;
  }

  .saudade-subtitle {
    font-size: clamp(14px, 2.5vw, 17px);
    color: #b07090;
    text-align: center;
    margin-bottom: 52px;
    max-width: 360px;
    line-height: 1.6;
  }

  .buttons-wrapper {
    position: relative;
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .btn-sim {
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 700;
    padding: 16px 44px;
    border-radius: 50px;
    border: none;
    background: linear-gradient(135deg, #f9a8d4, #f472b6);
    color: white;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(244, 114, 182, .4);
    transition: transform .15s, box-shadow .15s;
  }

  .btn-sim:hover {
    transform: scale(1.06);
  }

  .btn-nao {
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 14px 36px;
    border-radius: 50px;
    border: 2px solid #f9a8d4;
    background: white;
    color: #d4709a;
    cursor: pointer;
    position: absolute;
    white-space: nowrap;
    box-shadow: 0 4px 12px rgba(249, 168, 212, .2);
  }

  .hearts {
    display: flex;
    gap: 10px;
    margin-top: 48px;
  }

  .heart {
    font-size: 22px;
    animation: heartbeat 1.4s ease-in-out infinite;
  }

  .heart:nth-child(2) {
    animation-delay: .2s;
  }

  .heart:nth-child(3) {
    animation-delay: .4s;
  }

  @keyframes heartbeat {

    0%,
    100% {
      transform: scale(1);
    }

    14% {
      transform: scale(1.25);
    }

    28% {
      transform: scale(1);
    }

    42% {
      transform: scale(1.15);
    }

    70% {
      transform: scale(1);
    }
  }

  .floating-star {
    position: absolute;
    pointer-events: none;
    animation: floatStar linear infinite;
    opacity: .3;
    font-size: 18px;
  }

  @keyframes floatStar {
    0% {
      transform: translateY(0) rotate(0deg);
      opacity: .3;
    }

    50% {
      opacity: .6;
    }

    100% {
      transform: translateY(-60px) rotate(360deg);
      opacity: 0;
    }
  }

  .message-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(255, 200, 220, .7);
    backdrop-filter: blur(6px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .message-overlay.show {
    display: flex;
  }

  .message-card {
    background: white;
    border-radius: 28px;
    padding: 48px 52px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(212, 112, 154, .25);
    max-width: 420px;
    width: 90%;
    animation: popIn .5s cubic-bezier(.34, 1.56, .64, 1) forwards;
  }

  @keyframes popIn {
    from {
      transform: scale(.6);
      opacity: 0;
    }

    to {
      transform: scale(1);
      opacity: 1;
    }
  }

  .message-card .emoji {
    font-size: 56px;
    margin-bottom: 16px;
    display: block;
  }

  .message-card h2 {
    font-family: 'Pacifico', cursive;
    color: #d4709a;
    font-size: 26px;
    margin-bottom: 12px;
  }

  .message-card p {
    color: #b07090;
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 28px;
  }

  .btn-whatsapp {
    display: inline-block;
    background: linear-gradient(135deg, #25d366, #128c7e);
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 700;
    padding: 15px 40px;
    border-radius: 50px;
    text-decoration: none;
    box-shadow: 0 6px 20px rgba(37, 211, 102, .35);
    transition: transform .15s;
  }

  .btn-whatsapp:hover {
    transform: scale(1.05);
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  // Confetti
  const colors = ['#f9a8d4', '#fbcfe8', '#fde68a', '#a78bfa', '#c4b5fd', '#86efac', '#fca5a5', '#fdba74'];
  const cfc = document.getElementById('confetti');
  for (let i = 0; i < 55; i++) {
    const el = document.createElement('div'); el.className = 'confetti';
    const sz = Math.random() * 10 + 6;
    el.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random() * 100}%;background:${colors[Math.floor(Math.random() * colors.length)]};border-radius:${Math.random() > .5 ? '50%' : '2px'};animation-duration:${Math.random() * 6 + 4}s;animation-delay:${Math.random() * 6}s;`;
    cfc.appendChild(el);
  }

  // ── THREE.JS 3D CAKE ──
  const mount = document.getElementById('cakeMount');
  const size = mount.offsetWidth || 280;

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(size, size);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  mount.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
  camera.position.set(0, 3.2, 5.5);
  camera.lookAt(0, 0.4, 0);

  // Lights
  const ambient = new THREE.AmbientLight(0xfff0f8, 0.7);
  scene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.1);
  dirLight.position.set(4, 8, 5);
  dirLight.castShadow = true;
  scene.add(dirLight);
  const rimLight = new THREE.DirectionalLight(0xf9a8d4, 0.5);
  rimLight.position.set(-4, 2, -3);
  scene.add(rimLight);

  // Ground shadow plane
  const shadowGeo = new THREE.CircleGeometry(1.6, 64);
  const shadowMat = new THREE.MeshBasicMaterial({ color: 0xf472b6, transparent: true, opacity: 0.12 });
  const shadowPlane = new THREE.Mesh(shadowGeo, shadowMat);
  shadowPlane.rotation.x = -Math.PI / 2;
  shadowPlane.position.y = -1.01;
  scene.add(shadowPlane);

  const cakeGroup = new THREE.Group();
  scene.add(cakeGroup);

  // Helper: smooth cylinder with rounded top edge feel via lathe
  function makeCylinder(rt, rb, h, col, shine = 0.6) {
    const geo = new THREE.CylinderGeometry(rt, rb, h, 64, 1);
    const mat = new THREE.MeshPhongMaterial({ color: col, shininess: shine * 120, specular: 0xffffff });
    return new THREE.Mesh(geo, mat);
  }

  // ── CAKE BODY ──
  const bodyMat = new THREE.MeshPhongMaterial({ color: 0xe040a0, shininess: 80, specular: 0xffd6f0 });
  const body = new THREE.Mesh(new THREE.CylinderGeometry(1.35, 1.38, 2.0, 64), bodyMat);
  body.position.y = 0;
  cakeGroup.add(body);

  // Top frosting (white layer on top)
  const frostMat = new THREE.MeshPhongMaterial({ color: 0xfce4ec, shininess: 100, specular: 0xffffff });
  const frostTop = new THREE.Mesh(new THREE.CylinderGeometry(1.36, 1.36, 0.12, 64), frostMat);
  frostTop.position.y = 1.0;
  cakeGroup.add(frostTop);

  // Frosting drip ring around edge
  const dripMat = new THREE.MeshPhongMaterial({ color: 0xfce4ec, shininess: 90, specular: 0xffffff });
  for (let i = 0; i < 18; i++) {
    const a = (i / 18) * Math.PI * 2;
    const dripH = 0.18 + Math.sin(i * 2.3) * 0.06;
    const drip = new THREE.Mesh(
      new THREE.CylinderGeometry(0.09, 0.07, dripH, 12),
      dripMat
    );
    drip.position.set(Math.cos(a) * 1.28, 1.0 - dripH / 2 + 0.02, Math.sin(a) * 1.28);
    cakeGroup.add(drip);
    // drip bottom sphere
    const ball = new THREE.Mesh(new THREE.SphereGeometry(0.08, 12, 8), dripMat);
    ball.position.set(Math.cos(a) * 1.28, 1.0 - dripH + 0.01, Math.sin(a) * 1.28);
    cakeGroup.add(ball);
  }

  // Bottom plate/base
  const plateMat = new THREE.MeshPhongMaterial({ color: 0xf8bbd0, shininess: 60 });
  const plate = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 0.12, 64), plateMat);
  plate.position.y = -1.06;
  cakeGroup.add(plate);

  // ── HEARTS on side ──
  function makeHeart(scale) {
    const shape = new THREE.Shape();
    shape.moveTo(0, 0);
    shape.bezierCurveTo(0, 0.3, 0.5, 0.6, 0.5, 0.3);
    shape.bezierCurveTo(0.5, -0.1, 0, -0.4, 0, -0.6);
    shape.bezierCurveTo(0, -0.4, -0.5, -0.1, -0.5, 0.3);
    shape.bezierCurveTo(-0.5, 0.6, 0, 0.3, 0, 0);
    const geo = new THREE.ShapeGeometry(shape, 20);
    const mat = new THREE.MeshPhongMaterial({ color: 0xff3d71, shininess: 100, specular: 0xff9ab5, side: THREE.DoubleSide });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.scale.setScalar(scale);
    return mesh;
  }

  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2;
    const h = makeHeart(0.28);
    h.position.set(Math.cos(a) * 1.4, -0.1, Math.sin(a) * 1.4);
    h.rotation.y = -a;
    h.rotation.z = Math.PI; // flip upright
    cakeGroup.add(h);
  }

  // ── CANDLES ──
  // "2" and "0" as two candles with numbers as textures using canvas
  function makeNumberTexture(num) {
    const c = document.createElement('canvas');
    c.width = 64; c.height = 128;
    const cx2 = c.getContext('2d');
    cx2.clearRect(0, 0, 64, 128);
    cx2.fillStyle = 'rgba(255,255,255,0.9)';
    cx2.font = 'bold 52px Nunito, sans-serif';
    cx2.textAlign = 'center';
    cx2.textBaseline = 'middle';
    cx2.fillText(num, 32, 64);
    return new THREE.CanvasTexture(c);
  }

  function makeCandle(x, z, numChar) {
    const g = new THREE.Group();

    // Body
    const candleMat = new THREE.MeshPhongMaterial({ color: 0xfbbf24, shininess: 80, specular: 0xffeaa0 });
    const candleBody = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.13, 0.9, 24), candleMat);
    candleBody.position.y = 0.45;
    g.add(candleBody);

    // Number label on candle
    const tex = makeNumberTexture(numChar);
    const labelMat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide });
    const label = new THREE.Mesh(new THREE.PlaneGeometry(0.22, 0.44), labelMat);
    label.position.y = 0.45;
    label.position.z = 0.14;
    g.add(label);

    // Wick
    const wickMat = new THREE.MeshBasicMaterial({ color: 0x5c3317 });
    const wick = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.12, 8), wickMat);
    wick.position.y = 0.96;
    g.add(wick);

    // Flame outer
    const flameGeo = new THREE.SphereGeometry(0.09, 12, 8);
    flameGeo.scale(1, 1.7, 1);
    const flameMat = new THREE.MeshPhongMaterial({ color: 0xf472b6, emissive: 0xf9a8d4, emissiveIntensity: 0.8, shininess: 200, transparent: true, opacity: 0.95 });
    const flame = new THREE.Mesh(flameGeo, flameMat);
    flame.position.y = 1.12;
    g.add(flame);

    // Flame inner glow
    const innerGeo = new THREE.SphereGeometry(0.05, 10, 8);
    innerGeo.scale(1, 1.4, 1);
    const innerMat = new THREE.MeshPhongMaterial({ color: 0xfde68a, emissive: 0xfde68a, emissiveIntensity: 1.0, shininess: 300 });
    const innerFlame = new THREE.Mesh(innerGeo, innerMat);
    innerFlame.position.y = 1.11;
    g.add(innerFlame);

    g.position.set(x, 1.06, z);
    return { group: g, flame, innerFlame };
  }

  const candle1 = makeCandle(-0.38, 0.0, '2');
  const candle2 = makeCandle(0.38, 0.0, '0');
  cakeGroup.add(candle1.group);
  cakeGroup.add(candle2.group);

  // Small sprinkle dots
  const sprinkleMat = [
    new THREE.MeshBasicMaterial({ color: 0xfce4ec }),
    new THREE.MeshBasicMaterial({ color: 0xfde68a }),
    new THREE.MeshBasicMaterial({ color: 0xa78bfa }),
  ];
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    const sp = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), sprinkleMat[i % 3]);
    sp.position.set(Math.cos(a) * 0.85, 1.08, Math.sin(a) * 0.85);
    cakeGroup.add(sp);
  }

  // Rotate cake group slightly for nice 3/4 view angle
  cakeGroup.rotation.x = 0.0;

  let t = 0;
  function animate() {
    requestAnimationFrame(animate);
    t += 0.016;
    cakeGroup.rotation.y += 0.012;

    // Flame flicker
    const flicker = 1 + Math.sin(t * 8) * 0.08 + Math.sin(t * 13) * 0.05;
    [candle1, candle2].forEach(c => {
      c.flame.scale.set(flicker, flicker, flicker);
      c.innerFlame.scale.set(flicker * 0.9, flicker * 0.9, flicker * 0.9);
    });

    renderer.render(scene, camera);
  }
  animate();

  // Responsive resize
  window.addEventListener('resize', () => {
    const s = mount.offsetWidth;
    renderer.setSize(s, s);
  });

  // ── Fugitive Não button ──
  let naoClicks = 0;
  const btnNao = document.getElementById('btnNao');
  function handleNao() {
    naoClicks++;
    const nx = (Math.random() - .5) * 340;
    const ny = (Math.random() - .5) * 220;
    btnNao.style.transition = 'transform 0.3s cubic-bezier(.34,1.56,.64,1),font-size 0.3s';
    btnNao.style.transform = `translate(${nx}px,${ny}px)`;
    if (naoClicks >= 3) { btnNao.style.fontSize = '11px'; btnNao.style.padding = '10px 20px'; }
    if (naoClicks >= 5) { btnNao.style.opacity = '0.2'; btnNao.style.fontSize = '9px'; btnNao.style.padding = '8px 14px'; }
  }
  function handleSim() { document.getElementById('overlay').classList.add('show'); }
  window.addEventListener('resize', () => { btnNao.style.transform = 'translate(0,0)'; naoClicks = 0; });
</script>
